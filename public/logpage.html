<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            font-family: 'Courier New', monospace;
            color: #00ff41;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(0, 255, 65, 0.1);
            border-top: 4px solid #00ff41;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .text {
            font-size: 24px;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .details {
            font-size: 14px;
            color: #00cc33;
            margin-top: 10px;
            min-height: 20px;
        }

        .progress-bar {
            width: 300px;
            height: 6px;
            background: rgba(0, 255, 65, 0.1);
            border-radius: 3px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00ff41;
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #00ff41;
        }

        .encrypted-text {
            font-size: 12px;
            color: rgba(0, 255, 65, 0.3);
            margin-top: 20px;
            letter-spacing: 1px;
            font-family: monospace;
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .flicker {
            animation: flicker 2s infinite;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="text" id="mainText">ENCRYPTING DATA...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="details" id="detailsText"></div>
        <div class="encrypted-text flicker" id="encryptedText"></div>
    </div>

    <script>
        const stages = [
            { text: 'INITIALIZING ENCRYPTION...', detail: 'Setting up AES-256 protocol', duration: 400 },
            { text: 'GENERATING KEY PAIR...', detail: 'RSA 4096-bit encryption', duration: 300 },
            { text: 'ENCRYPTING DATA BLOCKS...', detail: 'Processing 128-bit blocks', duration: 400 },
            { text: 'APPLYING CIPHER...', detail: 'CBC mode encryption', duration: 400 },
            { text: 'HASHING PAYLOAD...', detail: 'SHA-256 verification', duration: 200 },
            { text: 'FINALIZING SECURE TRANSFER...', detail: 'TLS 1.3 handshake', duration: 400 },
            { text: 'ENCRYPTION COMPLETE', detail: 'Data secured successfully', duration: 200 }
        ];

        let currentStage = 0;
        let progress = 0;
        const mainText = document.getElementById('mainText');
        const detailsText = document.getElementById('detailsText');
        const progressFill = document.getElementById('progressFill');
        const encryptedText = document.getElementById('encryptedText');

        function generateRandomHex() {
            const chars = '0123456789ABCDEF';
            let result = '';
            for (let i = 0; i < 64; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
                if ((i + 1) % 8 === 0 && i !== 63) result += ' ';
            }
            return result;
        }

        function updateEncryptedText() {
            encryptedText.textContent = generateRandomHex();
        }

        function updateStage() {
            if (currentStage < stages.length) {
                const stage = stages[currentStage];
                mainText.textContent = stage.text;
                detailsText.textContent = stage.detail;

                progress = ((currentStage + 1) / stages.length) * 100;
                progressFill.style.width = progress + '%';

                currentStage++;
                setTimeout(updateStage, stage.duration);
            }
        }

        // Redirect to index.html after 2 seconds
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2000);

        // Update encrypted text display
        setInterval(updateEncryptedText, 200);
        updateEncryptedText();

        // Start the encryption sequence
        updateStage();
    </script>
</body>

</html>
